<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELITE PRODUCTS | Luxury Goods at 50% Off</title>

<style>
:root {
--bg-black: #050505;
--card-bg: #0d0d0d;
--accent-gold: #d4af37;
--text-main: #ffffff;
--text-dim: #999999;
--border-color: #1a1a1a;
--transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
background-color: var(--bg-black);
color: var(--text-main);
overflow-x: hidden;
}

/* Announcement Bar */
.announcement-bar {
background: var(--accent-gold);
padding: 8px 0;
overflow: hidden;
white-space: nowrap;
}

.ticker-wrapper {
display: inline-block;
animation: ticker 25s linear infinite;
}

.ticker-item {
display: inline-block;
padding: 0 40px;
color: #000;
font-size: 11px;
font-weight: 900;
letter-spacing: 2.5px;
text-transform: uppercase;
}

@keyframes ticker {
0% { transform: translateX(0); }
100% { transform: translateX(-50%); }
}

/* Header */
header {
padding: 25px 5%;
display: flex;
justify-content: space-between;
align-items: center;
position: sticky;
top: 0;
background: rgba(5, 5, 5, 0.9);
backdrop-filter: blur(15px);
z-index: 1000;
border-bottom: 1px solid var(--border-color);
}

.logo {
font-size: 26px;
font-weight: 900;
letter-spacing: 6px;
color: var(--text-main);
text-decoration: none;
display: flex;
align-items: center;
gap: 10px;
}

.logo span {
color: var(--accent-gold);
}

nav {
display: flex;
gap: 35px;
}

nav a {
color: var(--text-dim);
text-decoration: none;
font-size: 13px;
font-weight: 600;
transition: var(--transition);
text-transform: uppercase;
letter-spacing: 1.5px;
}

nav a:hover {
color: var(--accent-gold);
}

.header-actions {
display: flex;
gap: 25px;
align-items: center;
}

.header-icon {
background: none;
border: none;
color: var(--text-main);
font-size: 20px;
cursor: pointer;
position: relative;
transition: var(--transition);
}

.header-icon:hover {
color: var(--accent-gold);
transform: scale(1.1);
}

.cart-count {
position: absolute;
top: -8px;
right: -10px;
background: var(--accent-gold);
color: #000;
font-size: 10px;
font-weight: 900;
width: 18px;
height: 18px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
}

/* Hero Section */
.hero {
padding: 80px 5% 50px;
text-align: center;
}

.hero h2 {
font-size: 56px;
font-weight: 900;
margin-bottom: 15px;
letter-spacing: -2px;
text-transform: uppercase;
}

.hero h2 span {
color: var(--accent-gold);
}

.hero p {
color: var(--text-dim);
font-size: 18px;
max-width: 600px;
margin: 0 auto;
line-height: 1.6;
}

/* Grid System */
.product-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
gap: 40px;
padding: 0 5% 100px;
}

/* Product Card */
.product-card {
background: var(--card-bg);
border: 1px solid var(--border-color);
border-radius: 8px;
overflow: hidden;
transition: var(--transition);
position: relative;
}

.product-card:hover {
border-color: var(--accent-gold);
transform: translateY(-10px);
box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

.image-container {
width: 100%;
aspect-ratio: 1/1;
overflow: hidden;
background: #111;
position: relative;
}

.product-image {
width: 100%;
height: 100%;
object-fit: cover;
transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.product-card:hover .product-image {
transform: scale(1.15);
}

.discount-badge {
position: absolute;
top: 20px;
left: 20px;
background: var(--accent-gold);
color: #000;
padding: 6px 14px;
font-size: 12px;
font-weight: 900;
border-radius: 4px;
text-transform: uppercase;
z-index: 2;
}

.product-info {
padding: 25px;
}

.product-category {
font-size: 10px;
color: var(--accent-gold);
font-weight: 800;
text-transform: uppercase;
letter-spacing: 2px;
margin-bottom: 8px;
}

.product-title {
font-size: 18px;
font-weight: 700;
margin-bottom: 12px;
color: var(--text-main);
letter-spacing: 0.5px;
}

.price-row {
display: flex;
align-items: center;
gap: 15px;
margin-bottom: 20px;
}

.current-price {
font-size: 22px;
font-weight: 900;
color: var(--text-main);
}

.old-price {
color: var(--text-dim);
text-decoration: line-through;
font-size: 16px;
}

.add-to-cart-btn {
width: 100%;
padding: 15px;
background: transparent;
border: 1.5px solid var(--accent-gold);
color: var(--accent-gold);
font-weight: 800;
font-size: 13px;
text-transform: uppercase;
letter-spacing: 2px;
cursor: pointer;
transition: var(--transition);
border-radius: 4px;
}

.add-to-cart-btn:hover {
background: var(--accent-gold);
color: #000;
}

/* Side Cart */
.cart-overlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0, 0, 0, 0.9);
z-index: 2000;
display: none;
opacity: 0;
transition: opacity 0.3s ease;
}

.cart-sidebar {
position: fixed;
top: 0;
right: -450px;
width: 450px;
height: 100%;
background: #0a0a0a;
z-index: 2001;
padding: 40px;
display: flex;
flex-direction: column;
transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1);
border-left: 1px solid var(--border-color);
overflow-y: auto;
margin-bottom: 30px;
/* Checkout Form */
.checkout-form {
display: none;
}

.checkout-form.active {
display: block;
}

.form-group {
margin-bottom: 20px;
}

.form-group label {
display: block;
font-size: 12px;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 8px;
color: var(--accent-gold);
}

.form-group input,
.form-group select {
width: 100%;
padding: 12px;
background: #111;
border: 1px solid var(--border-color);
color: white;
border-radius: 4px;
font-size: 14px;
}

.form-group input:focus,
.form-group select:focus {
outline: none;
border-color: var(--accent-gold);
}

.back-to-cart-btn {
width: 100%;
padding: 12px;
background: transparent;
border: 1px solid var(--border-color);
color: var(--text-dim);
font-weight: 700;
font-size: 12px;
text-transform: uppercase;
letter-spacing: 1px;
cursor: pointer;
margin-bottom: 15px;
border-radius: 4px;

</div>

<div class="cart-items" id="cart-items-container">

<div class="form-group">

<button type="button" class="back-to-cart-btn" id="back-to-cart-btn">Back to Cart</button>
<button type="submit" class="checkout-btn">Complete Order</button>
</form>
</div>
</div>

function showCheckoutForm() {

}

function showCartView() {
document.getElementById('checkout-form').classList.remove('active');

function generateOrderNumber() {
return 'ORD-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9).toUpperCase();
}

function generateInvoice(orderData) {
const orderNumber = generateOrderNumber();
const timestamp = new Date().toLocaleString();

let invoiceText = `

ORDER NUMBER: ${orderNumber}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
`;

orderData.items.forEach((item, index) => {
invoiceText += `${index + 1}. ${item.name}\n Price: $${item.price.toLocaleString('en-US', {minimumFractionDigits: 2})}\n\n`;
});

invoiceText += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
TOTAL AMOUNT: $${orderData.total.toLocaleString('en-US', {minimumFractionDigits: 2})}

Status: ORDER CONFIRMED ✓
Shipping: Processing...

Thank you for your order!
`;

return { orderNumber, invoice: invoiceText };
}
