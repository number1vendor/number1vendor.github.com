<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Elite Luxury</title>

<style>
body {
margin: 0;
font-family: Arial;
background: #000;
color: white;
}

/* HEADER */
header {
text-align: center;
padding: 20px;
border-bottom: 1px solid #222;
}

.logo {
font-size: 28px;
letter-spacing: 5px;
}

.slogan {
color: #777;
font-size: 13px;
}

/* SEARCH + FILTER */
.topbar {
display: flex;
justify-content: center;
gap: 10px;
padding: 15px;
}

input {
padding: 10px;
width: 200px;
border-radius: 8px;
border: none;
}

.filter-btn {
background: #111;
color: white;
border: 1px solid #333;
padding: 10px;
cursor: pointer;
border-radius: 8px;
}

/* GRID */
.section {
padding: 20px;
}

h2 {
border-left: 4px solid white;
padding-left: 10px;
}

.grid {
display: flex;
flex-wrap: wrap;
gap: 20px;
}

/* CARD */
.card {
background: #0a0a0a;
border: 1px solid #222;
width: 200px;
padding: 10px;
border-radius: 10px;
transition: 0.3s;
cursor: pointer;
}

.card:hover {
transform: translateY(-6px);
border-color: #555;
}

.card img {
width: 100%;
border-radius: 8px;
}

.price {
color: #aaa;
}

/* BUTTON */
button {
width: 100%;
padding: 8px;
border: none;
background: white;
color: black;
font-weight: bold;
margin-top: 8px;
cursor: pointer;
}

/* CART */
.cart {
position: fixed;
right: -300px;
top: 0;
width: 280px;
height: 100%;
background: #111;
padding: 15px;
border-left: 1px solid #333;
transition: 0.3s;
}

.cart.open {
right: 0;
}

/* MODAL */
.modal {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.8);
display: none;
align-items: center;
justify-content: center;
}

.modal-box {
background: #111;
padding: 20px;
border-radius: 12px;
width: 300px;
text-align: center;
}
</style>
</head>

<body>

<header>
<div class="logo">ELITE LUXURY</div>
<div class="slogan">Buy now. Resell later. Grind.</div>
</header>

<!-- SEARCH + FILTER -->
<div class="topbar">
<input placeholder="Search..." onkeyup="search(this.value)">
<button class="filter-btn" onclick="showAll()">All</button>
<button class="filter-btn" onclick="filter('shoes')">Shoes</button>
<button class="filter-btn" onclick="filter('watch')">Watches</button>
<button class="filter-btn" onclick="filter('cologne')">Cologne</button>
</div>

<!-- SHOES -->
<div class="section">
<h2>Shoes</h2>
<div class="grid">

<div class="card" data-type="shoes" onclick="openModal('Nike Air Force 1','$120')">
<img src="https://images.stockx.com/images/Nike-Air-Force-1-07-White-Product.jpg">
<h3>Nike Air Force 1</h3>
<p class="price">$120</p>
<button onclick="event.stopPropagation(); add()">Add</button>
</div>

<div class="card" data-type="shoes" onclick="openModal('Nike Dunk Panda','$150')">
<img src="https://images.stockx.com/images/Nike-Dunk-Low-Panda-Product.jpg">
<h3>Nike Dunk Panda</h3>
<p class="price">$150</p>
<button onclick="event.stopPropagation(); add()">Add</button>
</div>

</div>
</div>

<!-- WATCHES -->
<div class="section">
<h2>Watches</h2>
<div class="grid">

<div class="card" data-type="watch" onclick="openModal('Apple Watch','$399')">
<img src="https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/MQFX3">
<h3>Apple Watch</h3>
<p class="price">$399</p>
<button onclick="event.stopPropagation(); add()">Add</button>
</div>

</div>
</div>

<!-- COLOGNE -->
<div class="section">
<h2>Cologne</h2>
<div class="grid">

<div class="card" data-type="cologne" onclick="openModal('Valentino Roma','$110')">
<img src="https://images.unsplash.com/photo-1592945403244-b3fbafd7f539">
<h3>Valentino Roma</h3>
<p class="price">$110</p>
<button onclick="event.stopPropagation(); add()">Add</button>
</div>

<div class="card" data-type="cologne" onclick="openModal('JPG Le Male','$95')">
<img src="https://images.unsplash.com/photo-1615634262417-0e3c8a3c6f9c">
<h3>JPG Le Male</h3>
<p class="price">$95</p>
<button onclick="event.stopPropagation(); add()">Add</button>
</div>

</div>
</div>

<!-- CART -->
<div class="cart" id="cart">
<h3>Cart</h3>
<p>No backend yet</p>
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
<div class="modal-box" onclick="event.stopPropagation()">
<h3 id="mname"></h3>
<p id="mprice"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>
function add(){
alert("Added to cart");
}

/* CART */
function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

/* MODAL */
function openModal(name, price){
document.getElementById("modal").style.display="flex";
document.getElementById("mname").innerText=name;
document.getElementById("mprice").innerText=price;
}
function closeModal(){
document.getElementById("modal").style.display="none";
}

/* SEARCH */
function search(v){
document.querySelectorAll(".card").forEach(c=>{
c.style.display = c.innerText.toLowerCase().includes(v.toLowerCase())
? "block":"none";
});
}

/* FILTER */
function filter(type){
document.querySelectorAll(".card").forEach(c=>{
c.style.display = c.dataset.type === type ? "block":"none";
});
}
function showAll(){
document.querySelectorAll(".card").forEach(c=>{
c.style.display="block";
});
}
</script>

</body>
</html>

</body>
</html>
